name: Build Linux Flatpak

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtimes
        run: |
          flatpak install --user --noninteractive flathub \
            org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08 \
            io.qt.qtwebengine.BaseApp//6.7

      - name: Generate Flatpak manifest
        run: |
          python3 - << 'PYEOF'
          import json, os

          # Resolve icon: prefer a real PNG from backend/resources, else use a placeholder
          icon_src = None
          for root, dirs, files in os.walk("backend/resources"):
              for f in files:
                  if f.endswith(".png"):
                      icon_src = os.path.join(root, f)
                      break
              if icon_src:
                  break

          if icon_src:
              import shutil
              shutil.copy(icon_src, "icon.png")
          else:
              import struct, zlib
              def chunk(tag, data):
                  c = struct.pack(">I", len(data)) + tag + data
                  return c + struct.pack(">I", zlib.crc32(c[4:]) & 0xFFFFFFFF)
              sig  = b"\x89PNG\r\n\x1a\n"
              ihdr = chunk(b"IHDR", struct.pack(">IIBBBBB", 1, 1, 8, 2, 0, 0, 0))
              idat = chunk(b"IDAT", zlib.compress(b"\x00\x1e\x5f\x9f"))
              iend = chunk(b"IEND", b"")
              with open("icon.png", "wb") as fh:
                  fh.write(sig + ihdr + idat + iend)

          APP_ID = "io.github.illufoxkusanagi.TrainSimulationApp"

          manifest = {
              "app-id": APP_ID,
              "runtime": "org.freedesktop.Platform",
              "runtime-version": "23.08",
              "sdk": "org.freedesktop.Sdk",
              "base": "io.qt.qtwebengine.BaseApp",
              "base-version": "6.7",
              "command": "TrainSimulationApp",
              "finish-args": [
                  "--share=network",
                  "--share=ipc",
                  "--socket=fallback-x11",
                  "--socket=wayland",
                  "--device=dri",
                  "--filesystem=home"
              ],
              "modules": [
                  {
                      "name": "TrainSimulationApp",
                      "buildsystem": "cmake-ninja",
                      "builddir": True,
                      "config-opts": ["-DCMAKE_BUILD_TYPE=Release"],
                      "sources": [{"type": "dir", "path": "backend"}]
                  },
                  {
                      "name": "frontend",
                      "buildsystem": "simple",
                      "build-commands": [
                          "mkdir -p /app/share/train-simulation-app",
                          "cp -r . /app/share/train-simulation-app/frontend"
                      ],
                      "sources": [{"type": "dir", "path": "frontend/out"}]
                  },
                  {
                      "name": "desktop-integration",
                      "buildsystem": "simple",
                      "build-commands": [
                          "install -Dm644 " + APP_ID + ".desktop"
                              + " /app/share/applications/" + APP_ID + ".desktop",
                          "install -Dm644 icon.png"
                              + " /app/share/icons/hicolor/256x256/apps/"
                              + APP_ID + ".png"
                      ],
                      "sources": [
                          {"type": "dir", "path": "."}
                      ]
                  }
              ]
          }

          with open(f"{APP_ID}.json", "w") as fh:
              json.dump(manifest, fh, indent=2)
          print("Manifest written.")
          PYEOF

      - name: Write desktop file
        run: |
          APP_ID="io.github.illufoxkusanagi.TrainSimulationApp"
          printf '[Desktop Entry]\nType=Application\nName=Train Simulation App\nComment=Train Simulation Application\nExec=TrainSimulationApp\nIcon=%s\nCategories=Education;Science;\nTerminal=false\n' "$APP_ID" > "${APP_ID}.desktop"

      - name: Build Flatpak
        run: |
          APP_ID="io.github.illufoxkusanagi.TrainSimulationApp"
          flatpak-builder \
            --user \
            --install-deps-from=flathub \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build \
            "${APP_ID}.json"

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            TrainSimulationApp-Linux.flatpak \
            io.github.illufoxkusanagi.TrainSimulationApp

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainSimulationApp-Linux-Flatpak
          path: TrainSimulationApp-Linux.flatpak
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TrainSimulationApp-Linux.flatpak
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
