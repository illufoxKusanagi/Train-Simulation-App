name: Build Linux RPM

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            nodejs \
            npm \
            rpm \
            libgl1-mesa-dev \
            libcups2-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          modules: "qtwebchannel qthttpserver qtwebengine qtpositioning qtwebsockets"
          cache: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Backend
        run: |
          mkdir -p backend/build
          cd backend/build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Bundle Frontend with Backend
        run: |
          mkdir -p backend/build/bin/frontend
          cp -r frontend/out/* backend/build/bin/frontend/

      - name: Create AppImage
        run: |
          # Install linuxdeployqt dependencies
          sudo apt-get update && sudo apt-get install -y libfuse2 file

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/train-simulation-app

          # Copy binaries and resources
          cp backend/build/bin/TrainSimulationApp AppDir/usr/bin/train-simulation-app
          cp -r frontend/out/* AppDir/usr/share/train-simulation-app/

          # We need an icon for the desktop file. Creating a dummy one if not exists or copying one if available.
          touch AppDir/usr/share/icons/hicolor/256x256/apps/utilities-terminal.png

          # Create desktop entry
          cat > AppDir/usr/share/applications/train-simulation-app.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Train Simulation App
          Comment=Train Simulation Application
          Exec=train-simulation-app
          Icon=utilities-terminal
          Categories=Education;Simulation;
          Terminal=false
          EOF

          # Download linuxdeployqt
          wget https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod a+x linuxdeployqt-continuous-x86_64.AppImage

          # Set Qt path for linuxdeployqt
          # The install-qt-action sets Qt6_DIR. We can use qmake from there.
          export PATH=$Qt6_DIR/bin:$PATH

          # Bundle it
          # -unsupported-allow-new-glibc is needed because we build on a newer Ubuntu than the oldest supported
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/share/applications/train-simulation-app.desktop -appimage -unsupported-allow-new-glibc

          # Rename output
          mv Train_Simulation_App-*.AppImage TrainSimulationApp-Linux-x86_64.AppImage

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainSimulationApp-Linux-AppImage
          path: TrainSimulationApp-Linux-x86_64.AppImage
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: TrainSimulationApp-Linux-x86_64.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
