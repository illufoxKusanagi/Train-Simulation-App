name: Build Linux AppImage

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: linux
          target: desktop
          # qthttpserver, qtwebengine, qtwebchannel are not in the base Qt install
          modules: qtwebengine qtwebchannel qthttpserver qtwebsockets qtpositioning

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libgl-dev \
            libegl-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libgbm-dev \
            libdrm-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-util-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxcb-glx0-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrender-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxrandr-dev \
            libxshmfence-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libcups2-dev \
            libpango1.0-dev \
            libnss3-dev \
            libnspr4-dev \
            libasound2-dev \
            libdbus-1-dev \
            libpulse-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Configure CMake
        run: cmake -S backend -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build backend
        run: cmake --build build

      - name: Assemble AppDir
        run: |
          DESTDIR=$PWD/AppDir cmake --install build
          mkdir -p AppDir/usr/share/train-simulation-app
          cp -r frontend/out/. AppDir/usr/share/train-simulation-app/

      - name: Create desktop file and icon
        run: |
          APP_ICON="io.github.illufoxkusanagi.TrainSimulationApp"
          mkdir -p \
            AppDir/usr/share/applications \
            AppDir/usr/share/icons/hicolor/256x256/apps
          printf '[Desktop Entry]\nType=Application\nName=Train Simulation App\nComment=Train Simulation Application\nExec=TrainSimulationApp\nIcon=%s\nCategories=Education;Science;\nTerminal=false\n' \
            "$APP_ICON" > AppDir/usr/share/applications/${APP_ICON}.desktop
          ICON=$(find backend/resources -name '*.png' 2>/dev/null | head -1)
          if [ -n "$ICON" ]; then
            cp "$ICON" AppDir/usr/share/icons/hicolor/256x256/apps/${APP_ICON}.png
          fi

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          curl -Lo linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -Lo linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
          QMAKE=$QT_ROOT_DIR/bin/qmake \
          ./linuxdeploy \
            --appdir AppDir \
            --plugin qt \
            --executable AppDir/usr/bin/TrainSimulationApp \
            --desktop-file AppDir/usr/share/applications/io.github.illufoxkusanagi.TrainSimulationApp.desktop \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainSimulationApp-Linux
          path: TrainSimulationApp-*.AppImage
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TrainSimulationApp-*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
