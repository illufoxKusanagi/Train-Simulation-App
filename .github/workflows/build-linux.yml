name: Build Linux Flatpak

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtimes
        run: |
          # io.qt.qtwebengine.BaseApp is built on org.kde.Platform//6.7.
          # org.kde.Sdk//6.7 is the matching SDK — it ships all Qt 6.7 modules
          # including QtHttpServer, QtWebEngine, QtWebChannel, etc.
          flatpak install --user --noninteractive flathub \
            org.kde.Platform//6.7 \
            org.kde.Sdk//6.7 \
            io.qt.qtwebengine.BaseApp//6.7

      - name: Generate Flatpak manifest
        shell: python3 {0}
        run: |
          import json, os, shutil, struct, zlib

          APP_ID = "io.github.illufoxkusanagi.TrainSimulationApp"

          # Icon: prefer a real PNG from backend/resources, else generate a 1x1 placeholder
          icon_src = None
          for root, dirs, files in os.walk("backend/resources"):
            for f in files:
              if f.endswith(".png"):
                icon_src = os.path.join(root, f)
                break
            if icon_src:
              break

          if icon_src:
            shutil.copy(icon_src, "icon.png")
          else:
            def chunk(tag, data):
              c = struct.pack(">I", len(data)) + tag + data
              return c + struct.pack(">I", zlib.crc32(c[4:]) & 0xFFFFFFFF)
            sig  = b"\x89PNG\r\n\x1a\n"
            ihdr = chunk(b"IHDR", struct.pack(">IIBBBBB", 1, 1, 8, 2, 0, 0, 0))
            idat = chunk(b"IDAT", zlib.compress(b"\x00\x1e\x5f\x9f"))
            iend = chunk(b"IEND", b"")
            with open("icon.png", "wb") as fh:
              fh.write(sig + ihdr + idat + iend)

          # Desktop file
          with open(f"{APP_ID}.desktop", "w") as fh:
            fh.write("\n".join([
              "[Desktop Entry]",
              "Type=Application",
              "Name=Train Simulation App",
              "Comment=Train Simulation Application",
              "Exec=TrainSimulationApp",
              f"Icon={APP_ID}",
              "Categories=Education;Science;",
              "Terminal=false",
              "",
            ]))

          # Staging dir for desktop-integration module (only these two files)
          os.makedirs("flatpak-extras", exist_ok=True)
          shutil.copy("icon.png",           f"flatpak-extras/{APP_ID}.png")
          shutil.copy(f"{APP_ID}.desktop",  f"flatpak-extras/{APP_ID}.desktop")

          manifest = {
            "app-id": APP_ID,
            "runtime": "org.kde.Platform",
            "runtime-version": "6.7",
            "sdk": "org.kde.Sdk",
            "base": "io.qt.qtwebengine.BaseApp",
            "base-version": "6.7",
            "command": "TrainSimulationApp",
            "finish-args": [
              "--share=network",
              "--share=ipc",
              "--socket=fallback-x11",
              "--socket=wayland",
              "--device=dri",
              "--filesystem=home",
            ],
            "modules": [
              {
                "name": "TrainSimulationApp",
                "buildsystem": "cmake-ninja",
                "builddir": True,
                "config-opts": [
                  "-DCMAKE_BUILD_TYPE=Release",
                  # KDE SDK installs Qt into /usr inside the sandbox.
                  # CMAKE_PREFIX_PATH=/usr is now honoured first (CMakeLists.txt
                  # was fixed to put ${CMAKE_PREFIX_PATH} before local fallbacks).
                  "-DCMAKE_PREFIX_PATH=/usr",
                  "-DQt6_DIR=/usr/lib/cmake/Qt6",
                ],
                "sources": [{"type": "dir", "path": "backend"}],
              },
              {
                "name": "frontend",
                "buildsystem": "simple",
                "build-commands": [
                  "mkdir -p /app/share/train-simulation-app/frontend",
                  "cp -r . /app/share/train-simulation-app/frontend/",
                ],
                "sources": [{"type": "dir", "path": "frontend/out"}],
              },
              {
                "name": "desktop-integration",
                "buildsystem": "simple",
                "build-commands": [
                  f"install -Dm644 {APP_ID}.desktop /app/share/applications/{APP_ID}.desktop",
                  f"install -Dm644 {APP_ID}.png /app/share/icons/hicolor/256x256/apps/{APP_ID}.png",
                ],
                "sources": [{"type": "dir", "path": "flatpak-extras"}],
              },
            ],
          }

          with open(f"{APP_ID}.json", "w") as fh:
            json.dump(manifest, fh, indent=2)
          print(f"Manifest written: {APP_ID}.json")

      - name: Build Flatpak
        run: |
          APP_ID="io.github.illufoxkusanagi.TrainSimulationApp"
          flatpak-builder \
            --user \
            --install-deps-from=flathub \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build \
            "${APP_ID}.json"

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            TrainSimulationApp-Linux.flatpak \
            io.github.illufoxkusanagi.TrainSimulationApp

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainSimulationApp-Linux-Flatpak
          path: TrainSimulationApp-Linux.flatpak
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TrainSimulationApp-Linux.flatpak
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
