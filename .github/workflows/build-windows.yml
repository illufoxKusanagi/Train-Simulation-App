name: Build Windows Executable

on:
  push:
    branches: 
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches: 
      - master
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          modules: "qtwebchannel qthttpserver qtwebengine qtpositioning qtwebsockets"
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        shell: bash
        run: |
          cd frontend
          npm install
          npm run build
 
      - name: Build Backend
        shell: cmd
        run: |
          mkdir backend\build
          cd backend\build
          cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%Qt6_DIR%" ..
          cmake --build . --config Release

      - name: Deploy Qt Dependencies
        shell: powershell
        run: |
          cd backend/build
          
          # Check if executable exists
          if (-not (Test-Path "bin\TrainSimulationApp.exe")) {
            Write-Error "Executable not found at bin\TrainSimulationApp.exe"
            Get-ChildItem -Recurse *.exe
            exit 1
          }
          
          # Run windeployqt with verbose output
          & windeployqt.exe --release --no-translations --verbose 2 bin\TrainSimulationApp.exe
          
          # Copy frontend files
          if (Test-Path "../../frontend/out") {
            New-Item -ItemType Directory -Force -Path "bin/frontend"
            Copy-Item -Recurse "../../frontend/out/*" "bin/frontend/"
          }

          # Create run script
          @"
          @echo off
          cd /d "%~dp0"
          start "" "TrainSimulationApp.exe"
          "@ | Out-File -FilePath bin\TrainSimulationApp.bat -Encoding ASCII

      - name: Create ZIP archive
        shell: powershell
        run: |
          Compress-Archive -Path backend/build/bin/* -DestinationPath TrainSimulationApp-Windows-x64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainSimulationApp-Windows-x64
          path: TrainSimulationApp-Windows-x64.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: TrainSimulationApp-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
