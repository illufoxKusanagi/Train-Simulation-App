name: Build Windows Executable

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          modules: "qtwebchannel qthttpserver qtwebengine qtpositioning qtwebsockets"
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        shell: bash
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Backend
        shell: powershell
        run: |
          $QtRoot = $env:QT_ROOT_DIR
          if (-not $QtRoot) { $QtRoot = Split-Path (Split-Path $env:Qt6_DIR -Parent) -Parent }

          New-Item -ItemType Directory -Force -Path "backend\\build" | Out-Null
          Set-Location "backend\\build"

          & cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$QtRoot" `
            ..
          if ($LASTEXITCODE -ne 0) { throw "CMake configure failed" }

          & cmake --build . --config Release
          if ($LASTEXITCODE -ne 0) { throw "CMake build failed" }

      - name: Install OpenSSL
        shell: powershell
        run: choco install openssl --no-progress -y

      - name: Deploy Qt Dependencies
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Set-Location "backend\build"
          $BinDir = Resolve-Path "bin"
          $QtRoot = $env:QT_ROOT_DIR
          if (-not $QtRoot) { $QtRoot = Split-Path (Split-Path $env:Qt6_DIR -Parent) -Parent }

          # Verify executable exists before proceeding
          if (-not (Test-Path "$BinDir\TrainSimulationApp.exe")) {
            Write-Error "Executable not found at $BinDir\TrainSimulationApp.exe"
            Get-ChildItem -Recurse *.exe
            exit 1
          }

          # Run windeployqt
          & windeployqt.exe --release --compiler-runtime --verbose 1 "$BinDir\TrainSimulationApp.exe"
          if ($LASTEXITCODE -ne 0) { throw "windeployqt failed" }

          # OpenSSL DLLs (Qt 6.7 needs OpenSSL 3.x)
          foreach ($dir in @("C:\Program Files\OpenSSL-Win64\bin", "C:\Program Files\OpenSSL\bin")) {
            if (Test-Path $dir) {
              foreach ($dll in @("libcrypto-3-x64.dll", "libssl-3-x64.dll", "libcrypto-1_1-x64.dll", "libssl-1_1-x64.dll")) {
                $src = "$dir\$dll"
                if (Test-Path $src) { Copy-Item $src "$BinDir\" -Force }
              }
              break
            }
          }

          # Supplement QtWebEngineProcess.exe if windeployqt missed it
          if (-not (Test-Path "$BinDir\QtWebEngineProcess.exe")) {
            $f = Get-ChildItem "$QtRoot" -Recurse -Filter "QtWebEngineProcess.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($f) { Copy-Item $f.FullName "$BinDir\" -Force }
          }

          # WebEngine pak/resource files
          foreach ($pat in @("icudtl.dat", "*.pak", "v8_context_snapshot*.bin")) {
            Get-ChildItem "$QtRoot" -Recurse -Filter $pat -ErrorAction SilentlyContinue |
              Where-Object { $_.DirectoryName -notmatch "locales" } |
              ForEach-Object {
                if (-not (Test-Path "$BinDir\$($_.Name)")) {
                  Copy-Item $_.FullName "$BinDir\" -Force
                }
              }
          }

          # WebEngine locales
          $loc = Get-ChildItem "$QtRoot" -Recurse -Filter "qtwebengine_locales" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($loc -and -not (Test-Path "$BinDir\qtwebengine_locales")) {
            Copy-Item $loc.FullName "$BinDir\" -Recurse -Force
          }

          # Frontend static files
          New-Item -ItemType Directory -Force -Path "$BinDir\frontend" | Out-Null
          Copy-Item -Recurse -Force "..\..\frontend\out\*" "$BinDir\frontend\"

          # qt.conf — tells Qt to find plugins relative to the exe
          "[Paths]`nPrefix = ." | Out-File -FilePath "$BinDir\qt.conf" -Encoding ascii

          # Launcher batch — disables sandbox (required for WebEngine without GPU sandbox)
          "@echo off`ncd /d `"%~dp0`"`nset QTWEBENGINE_DISABLE_SANDBOX=1`nstart `"`" `"%~dp0TrainSimulationApp.exe`" %*" |
            Out-File -FilePath "$BinDir\TrainSimulationApp.bat" -Encoding ASCII

      - name: Create ZIP archive
        shell: powershell
        run: |
          Compress-Archive -Path "backend\\build\\bin\\*" -DestinationPath "TrainSimulationApp-Windows-x64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainSimulationApp-Windows-x64
          path: backend/build/bin/
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TrainSimulationApp-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
