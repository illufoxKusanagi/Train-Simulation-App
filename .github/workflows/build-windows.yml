name: Build Windows Executable

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          modules: "qtwebchannel qthttpserver qtwebengine qtpositioning qtwebsockets"
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        shell: bash
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Backend
        shell: powershell
        run: |
          $QtRoot = $env:QT_ROOT_DIR
          if (-not $QtRoot) { $QtRoot = Split-Path (Split-Path $env:Qt6_DIR -Parent) -Parent }

          New-Item -ItemType Directory -Force -Path "backend\\build" | Out-Null
          Set-Location "backend\\build"

          & cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$QtRoot" `
            ..
          if ($LASTEXITCODE -ne 0) { throw "CMake configure failed" }

          & cmake --build . --config Release
          if ($LASTEXITCODE -ne 0) { throw "CMake build failed" }

      - name: Install OpenSSL
        shell: powershell
        run: choco install openssl --no-progress -y

      - name: Bundle Frontend with Backend
        shell: bash
        run: |
          mkdir -p backend/build/bin/frontend
          cp -r frontend/out/* backend/build/bin/frontend/

      - name: Install OpenSSL
        shell: powershell
        run: |
          choco install openssl --no-progress
          # Identify OpenSSL DLL location (usually C:\Program Files\OpenSSL-Win64\bin)

      - name: Deploy Qt Dependencies
        shell: powershell
        run: |

          cd backend/build

          # Check if executable exists
          if (-not (Test-Path "bin\TrainSimulationApp.exe")) {
            Write-Error "Executable not found at bin\TrainSimulationApp.exe"
            Get-ChildItem -Recurse *.exe
            exit 1
          }

          # Run windeployqt with verbose output
          # Removed --no-translations to ensure WebEngine locale data is included
          & windeployqt.exe --release --verbose 2 --compiler-runtime bin\TrainSimulationApp.exe

          # Copy OpenSSL DLLs (OpenSSL 3.x for Qt 6.7)
          $opensslPath = "C:\Program Files\OpenSSL-Win64\bin"
          if (Test-Path $opensslPath) {
            Write-Host "Copying OpenSSL DLLs from $opensslPath"
            Copy-Item "$opensslPath\libcrypto-3-x64.dll" "bin\" -ErrorAction SilentlyContinue
            Copy-Item "$opensslPath\libssl-3-x64.dll" "bin\" -ErrorAction SilentlyContinue
            # Fallback for OpenSSL 1.1 if needed (older Qt)
            Copy-Item "$opensslPath\libcrypto-1_1-x64.dll" "bin\" -ErrorAction SilentlyContinue
            Copy-Item "$opensslPath\libssl-1_1-x64.dll" "bin\" -ErrorAction SilentlyContinue
          } else {
            Write-Warning "OpenSSL path not found at $opensslPath"
          }

          # Copy frontend files
          if (Test-Path "../../frontend/out") {
            New-Item -ItemType Directory -Force -Path "bin/frontend"
            Copy-Item -Recurse -Force "../../frontend/out/*" "bin/frontend/"
          }

          & windeployqt.exe --release --compiler-runtime --verbose 1 "$BinDir\\TrainSimulationApp.exe"

          # OpenSSL DLLs (Qt 6.7 needs OpenSSL 3.x)
          foreach ($dir in @("C:\\Program Files\\OpenSSL-Win64\\bin","C:\\Program Files\\OpenSSL\\bin")) {
            if (Test-Path $dir) {
              foreach ($dll in @("libcrypto-3-x64.dll","libssl-3-x64.dll")) {
                $src = "$dir\\$dll"
                if (Test-Path $src) { Copy-Item $src "$BinDir\\" -Force }
              }
              break
            }
          }

          # QtWebEngineProcess.exe (windeployqt should handle, supplement if missing)
          if (-not (Test-Path "$BinDir\\QtWebEngineProcess.exe")) {
            $f = Get-ChildItem "$QtRoot" -Recurse -Filter "QtWebEngineProcess.exe" | Select-Object -First 1
            if ($f) { Copy-Item $f.FullName "$BinDir\\" -Force }
          }

          # WebEngine pak/resource files
          foreach ($pat in @("icudtl.dat","*.pak","v8_context_snapshot*.bin")) {
            Get-ChildItem "$QtRoot" -Recurse -Filter $pat |
              Where-Object { $_.DirectoryName -notmatch "locales" } |
              ForEach-Object {
                if (-not (Test-Path "$BinDir\\$($_.Name)")) {
                  Copy-Item $_.FullName "$BinDir\\" -Force
                }
              }
          }

          # WebEngine locales
          $loc = Get-ChildItem "$QtRoot" -Recurse -Filter "qtwebengine_locales" -Directory | Select-Object -First 1
          if ($loc -and -not (Test-Path "$BinDir\\qtwebengine_locales")) {
            Copy-Item $loc.FullName "$BinDir\\" -Recurse -Force
          }

          # Frontend
          if (Test-Path "frontend\\out") {
            New-Item -ItemType Directory -Force -Path "$BinDir\\frontend" | Out-Null
            Copy-Item -Recurse "frontend\\out\\*" "$BinDir\\frontend\\" -Force
          }

          # qt.conf
          "[Paths]`nPrefix = ." | Out-File -FilePath "$BinDir\\qt.conf" -Encoding ascii

          # Launcher batch
          "@echo off`ncd /d `"%~dp0`"`nset QTWEBENGINE_DISABLE_SANDBOX=1`nstart `"`" `"%~dp0TrainSimulationApp.exe`" %*" |
            Out-File -FilePath "$BinDir\\TrainSimulationApp.bat" -Encoding ASCII

      - name: Create ZIP archive
        shell: powershell
        run: |
          Compress-Archive -Path "backend\\build\\bin\\*" -DestinationPath "TrainSimulationApp-Windows-x64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainSimulationApp-Windows-x64
          path: TrainSimulationApp-Windows-x64.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: TrainSimulationApp-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
