name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., v2.1.0). Leave empty to auto-increment patch from latest v2.x.x tag."
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST=$(git tag --sort=-v:refname | grep -E '^v2\.' | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="v2.0.0"
            else
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              PATCH=$(echo "$LATEST" | cut -d. -f3)
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next release: $VERSION"

  build-windows:
    needs: prepare
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  build-fedora:
    needs: prepare
    uses: ./.github/workflows/build-fedora.yml
    secrets: inherit

  build-deb:
    needs: prepare
    uses: ./.github/workflows/build-deb.yml
    secrets: inherit

  create-release:
    needs: [prepare, build-windows, build-fedora, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Train Simulation App ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/TrainSimulationApp-Windows-x64.zip
            artifacts/*.rpm
            artifacts/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
