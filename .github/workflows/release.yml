name: Create Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v2.0.1)"
        required: true
        type: string

jobs:
  build-windows:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.ref, 'refs/tags/') &&
       (github.event.base_ref == 'refs/heads/main' ||
        github.event.base_ref == 'refs/heads/master'))
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  build-fedora:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.ref, 'refs/tags/') &&
       (github.event.base_ref == 'refs/heads/main' ||
        github.event.base_ref == 'refs/heads/master'))
    uses: ./.github/workflows/build-fedora.yml
    secrets: inherit

  build-deb:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.ref, 'refs/tags/') &&
       (github.event.base_ref == 'refs/heads/main' ||
        github.event.base_ref == 'refs/heads/master'))
    uses: ./.github/workflows/build-deb.yml
    secrets: inherit

  create-release:
    needs: [build-windows, build-fedora, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: Train Simulation App ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/TrainSimulationApp-Windows-x64.zip
            artifacts/*.rpm
            artifacts/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
