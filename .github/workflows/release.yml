name: Create Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v2.0.1)"
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.0"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          modules: "qtwebchannel qthttpserver qtwebengine qtpositioning qtwebsockets"

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Build Backend
        working-directory: ./backend
        run: |
          mkdir build
          cd build
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Create Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path output/DailyReminder
          Copy-Item backend/build/backend.exe output/DailyReminder/
          New-Item -ItemType Directory -Force -Path output/DailyReminder/frontend
          Copy-Item -Recurse frontend/out/* output/DailyReminder/frontend/
          windeployqt.exe --release --no-translations output/DailyReminder/backend.exe
          @"
          @echo off
          start "" "%~dp0backend.exe"
          "@ | Out-File -FilePath output/DailyReminder/DailyReminder.bat -Encoding ASCII
          Compress-Archive -Path output/DailyReminder/* -DestinationPath DailyReminder-Windows-x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DailyReminder-Windows-x64.zip
          body: |
            ## Daily Reminder Release ${{ github.ref_name }}

            ### Downloads
            - **Windows**: DailyReminder-Windows-x64.zip
            - **Linux (Fedora/RHEL)**: daily-reminder-*.rpm

            ### Installation

            **Windows:**
            1. Download `DailyReminder-Windows-x64.zip`
            2. Extract the ZIP file
            3. Run `DailyReminder.bat` or `backend.exe`

            **Linux (RPM):**
            ```bash
            sudo rpm -ivh daily-reminder-*.rpm
            daily-reminder
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: fedora:latest

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            qt6-qtbase-devel \
            qt6-qtwebengine-devel \
            qt6-qtwebchannel-devel \
            qt6-qthttpserver-devel \
            cmake \
            gcc-c++ \
            make \
            rpm-build \
            nodejs \
            npm \
            git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Create RPM
        run: |
          cd frontend && npm install && npm run build && cd ..
          cd backend && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release .. && make -j$(nproc)
          cd ../..
          chmod +x build-rpm-new.sh
          ./build-rpm-new.sh

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./output/daily-reminder-1.0.0-1.fc*.x86_64.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
